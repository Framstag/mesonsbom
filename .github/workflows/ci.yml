name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build \
            nlohmann-json3-dev \
            libcxxopts-dev \
            libpkgconf-dev \
            catch2

      - name: Cache Meson build
        uses: actions/cache@v4
        with:
          path: builddir
          key: meson-${{ hashFiles('meson.build') }}-${{ hashFiles('meson.options') || 'no-options' }}

      - name: Configure and build
        run: |
          meson setup builddir --buildtype=release
          ninja -C builddir

      - name: Run tests
        run: |
          meson test -C builddir --verbose
